name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Restore Electron caches
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ELECTRON_CACHE }}
          ${{ env.ELECTRON_BUILDER_CACHE }}
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-

    - name: Configure npm network retries
      run: |
        npm config set fetch-retries 5
        npm config set fetch-retry-factor 2
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000
        npm config set fetch-timeout 300000

    - name: Install dependencies (retry)
      run: |
        set +e
        for attempt in 1 2 3; do
          echo "npm ci attempt ${attempt}/3"
          npm ci --prefer-offline --no-audit
          status=$?
          if [ $status -eq 0 ]; then
            exit 0
          fi
          if [ $attempt -eq 3 ]; then
            exit $status
          fi
          sleep $((15 * attempt))
        done

    - name: Run linter
      run: npm run lint || echo "Linter not configured, skipping..."

    - name: Run tests
      run: npm test -- --run

    - name: Generate coverage report
      run: npm run test:coverage
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

  build:
    runs-on: ${{ matrix.os }}
    needs: test
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Restore Electron caches
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.ELECTRON_CACHE }}
          ${{ env.ELECTRON_BUILDER_CACHE }}
        key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-

    - name: Configure npm network retries
      run: |
        npm config set fetch-retries 5
        npm config set fetch-retry-factor 2
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000
        npm config set fetch-timeout 300000

    - name: Install dependencies (retry, non-Windows)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set +e
        for attempt in 1 2 3; do
          echo "npm ci attempt ${attempt}/3"
          npm ci --prefer-offline --no-audit
          status=$?
          if [ $status -eq 0 ]; then
            exit 0
          fi
          if [ $attempt -eq 3 ]; then
            exit $status
          fi
          sleep $((15 * attempt))
        done

    - name: Install dependencies (retry, Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $maxAttempts = 3
        for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
          Write-Host "npm ci attempt $attempt/$maxAttempts"
          npm ci --prefer-offline --no-audit
          if ($LASTEXITCODE -eq 0) { break }
          if ($attempt -eq $maxAttempts) { exit $LASTEXITCODE }
          Start-Sleep -Seconds (15 * $attempt)
        }

    - name: Build application
      run: npm run build

    - name: Verify build
      run: npm run build:verify
